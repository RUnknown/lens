name: 打包 Windows 桌面程序 (Lens)

# 手动触发，你也可以改成 push tags 等方式
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # 1. 设置 Python 环境
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 2. 设置 pnpm 环境
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装 Python 依赖 & 打包工具
        run: |
          pip install .
          pip install pyinstaller pystray pillow

      # 3. 构建前端为静态文件
      - name: 构建前端
        shell: pwsh
        run: |
          # 临时禁用/删除可能存在的 monorepo 配置文件，让 pnpm 把 ui 当作独立项目
          if (Test-Path pnpm-workspace.yaml) { Rename-Item pnpm-workspace.yaml pnpm-workspace.yaml.bak }
          # 如果根 package.json 里定义了 workspaces 字段，也临时删除
          if (Test-Path package.json) {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            if ($pkg.workspaces -or $pkg.packages) {
              Rename-Item package.json package.json.bak
            }
          }

          cd ui
          pnpm install --no-workspaces
          $env:LENS_UI_STATIC_EXPORT=1
          pnpm run build
          cd ..

      # 4. 动态生成启动器脚本（通过缩进 + 去空格技巧）
      - name: 创建启动器脚本
        shell: pwsh
        run: |
          $code = @'
          import os, sys, threading, webbrowser
          import uvicorn
          from pystray import Icon, MenuItem, Menu
          from PIL import Image

          # 生成一个简单的托盘图标
          img = Image.new('RGB', (64, 64), color='blue')
          img.save('tray_icon.ico', format='ICO')

          def start_server():
              static_dir = os.path.join(sys._MEIPASS, 'ui/out') if getattr(sys, 'frozen', False) else 'ui/out'
              os.environ['LENS_UI_STATIC_DIR'] = static_dir
              from lens_api.gateway.service import app
              uvicorn.run(app, host='127.0.0.1', port=18080)

          def setup_tray():
              def open_ui():
                  webbrowser.open('http://127.0.0.1:18080')
              def quit_app(icon):
                  icon.stop()
                  os._exit(0)

              icon = Icon('lens', Image.open('tray_icon.ico'), menu=Menu(
                  MenuItem('打开管理后台', open_ui),
                  MenuItem('退出', quit_app)
              ))
              icon.run()

          if __name__ == '__main__':
              threading.Thread(target=start_server, daemon=True).start()
              setup_tray()
          '@
          $code -replace '(?m)^ {8}', '' | Out-File -FilePath launcher.py -Encoding utf8

      # 5. 动态生成 PyInstaller 配置
      - name: 创建 PyInstaller spec 文件
        shell: pwsh
        run: |
          $spec = @'
          # -*- mode: python ; coding: utf-8 -*-
          a = Analysis(
              ['launcher.py'],
              pathex=[],
              binaries=[],
              datas=[('ui/out', 'ui/out')],
              hiddenimports=[],
              hookspath=[],
              runtime_hooks=[],
              excludes=['matplotlib', 'numpy', 'pandas', 'scipy'],
              win_no_prefer_redirects=False,
              win_private_assemblies=False,
              cipher=None,
              noarchive=False,
          )
          pyz = PYZ(a.pure, a.zipped_data, cipher=None)
          exe = EXE(
              pyz,
              a.scripts,
              [],
              exclude_binaries=True,
              name='Lens',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=True,
              console=False,
              icon='tray_icon.ico'
          )
          coll = COLLECT(
              exe,
              a.binaries,
              a.zipfiles,
              a.datas,
              strip=False,
              upx=True,
              upx_exclude=[],
              name='Lens'
          )
          '@
          $spec -replace '(?m)^ {8}', '' | Out-File -FilePath lens.spec -Encoding utf8

      - name: 使用 PyInstaller 打包
        run: pyinstaller lens.spec

      # 6. 上传打包结果
      - name: 上传打包结果
        uses: actions/upload-artifact@v4
        with:
          name: Lens-Windows
          path: dist/Lens/
