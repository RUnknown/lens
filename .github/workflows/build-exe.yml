name: 打包 Windows 桌面程序

on:
  push:
    分支: [main]
  workflow_dispatch:

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'ui/pnpm-lock.yaml'

      - name: 安装 Python 依赖
        run: pip install . pyinstaller pystray pillow aiosqlite

      - name: 构建前端
        shell: pwsh
        run: |
          if (Test-Path pnpm-workspace.yaml) { Remove-Item pnpm-workspace.yaml -Force }
          if (Test-Path package.json) {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            if ($pkg.workspaces -or $pkg.packages) { Remove-Item package.json -Force }
          }
          cd ui
          if (Test-Path pnpm-workspace.yaml) { Remove-Item pnpm-workspace.yaml -Force }
          if (Test-Path package.json) {
            $pkgUi = Get-Content package.json -Raw | ConvertFrom-Json
            if ($pkgUi.workspaces -or $pkgUi.packages) { Remove-Item package.json -Force }
          }
          pnpm install --frozen-lockfile
          $env:LENS_UI_STATIC_EXPORT=1
          pnpm run build
          cd ..

      - name: 生成托盘图标
        shell: pwsh
        run: |
          $base64 = ""
          [IO.File]::WriteAllBytes("tray_icon.ico", [Convert]::FromBase64String($base64))

      - name: 创建启动器脚本 (包含数据库初始化)
        shell: python
        run: |
          import textwrap

          code = textwrap.dedent("""\
            import os, sys, threading, webbrowser, traceback
            import uvicorn
            from pystray import Icon, MenuItem, Menu
            from PIL import Image
            from alembic.config import Config
            from alembic import command

            os.environ.setdefault('LENS_DATABASE_URL', 'sqlite+aiosqlite:///./lens.db')
            os.environ.setdefault('LENS_UI_STATIC_EXPORT', '1')

            def init_database():
                try:
                    base_dir = sys._MEIPASS if getattr(sys, 'frozen', False) else os.getcwd()
                    alembic_ini = os.path.join(base_dir, 'alembic.ini')
                    migrations_dir = os.path.join(base_dir, 'migrations')

                    if not os.path.exists(alembic_ini):
                        print("alembic.ini not found, skipping migration.")
                        return
                    if not os.path.isdir(migrations_dir):
                        print("migrations directory not found, skipping migration.")
                        return

                    cfg = Config(alembic_ini)
                    cfg.set_main_option("script_location", migrations_dir)
                    cfg.set_main_option("sqlalchemy.url", os.environ["LENS_DATABASE_URL"])

                    print("Running database migrations...")
                    command.upgrade(cfg, "head")
                    print("Database migration completed.")
                except Exception as e:
                    print(f"Migration failed: {e}")
                    traceback.print_exc()

                try:
                    from lens_api.cli import seed_admin
                    import argparse
                    ns = argparse.Namespace(username="admin", password="admin")
                    seed_admin(ns)
                    print("Admin user seeded (admin/admin).")
                except Exception:
                    print("Admin user already exists or seeding not available.")

            def start_server():
                try:
                    base_dir = sys._MEIPASS if getattr(sys, 'frozen', False) else os.getcwd()
                    static_dir = os.path.join(base_dir, 'ui', 'out')
                    os.environ['LENS_UI_STATIC_DIR'] = static_dir

                    init_database()

                    from lens_api.gateway.service import app
                    uvicorn.run(app, host='127.0.0.1', port=18080)
                except Exception:
                    print("Server startup failed:")
                    traceback.print_exc()
                    with open('startup_error.log', 'w') as f:
                        traceback.print_exc(file=f)
                    input("Press Enter to exit...")
                    os._exit(1)

            def setup_tray():
                icon_path = os.path.join(sys._MEIPASS, 'tray_icon.ico') if getattr(sys, 'frozen', False) else 'tray_icon.ico'
                def open_ui():
                    webbrowser.open('http://127.0.0.1:18080')
                def quit_app(icon):
                    icon.stop()
                    os._exit(0)
                icon = Icon('lens', Image.open(icon_path), menu=Menu(
                    MenuItem('Open Admin', open_ui),
                    MenuItem('Exit', quit_app)
                ))
                icon.run()

            if __name__ == '__main__':
                threading.Thread(target=start_server, daemon=True).start()
                setup_tray()
            """)

          with open('launcher.py', 'w', encoding='utf-8') as f:
              f.write(code)

      - name: 创建 PyInstaller spec (修补隐藏导入)
        shell: python
        run: |
          import os, textwrap

          datas = [('ui/out', 'ui/out'), ('tray_icon.ico', '.')]
          for filename in ['alembic.ini']:
              if os.path.exists(filename):
                  datas.append((filename, '.'))
          if os.path.isdir('migrations'):
              datas.append(('migrations', 'migrations'))

          spec = textwrap.dedent(f"""\
            # -*- mode: python ; coding: utf-8 -*-
            a = Analysis(
                ['launcher.py'],
                pathex=[],
                binaries=[],
                datas={datas},
                hiddenimports=[
                    'aiosqlite',
                    'uvicorn.logging',
                    'uvicorn.loops',
                    'uvicorn.loops.auto',
                    'uvicorn.protocols',
                    'uvicorn.protocols.http',
                    'uvicorn.protocols.http.auto',
                    'uvicorn.protocols.websockets',
                    'uvicorn.protocols.websockets.auto',
                    'uvicorn.lifespan',
                    'uvicorn.lifespan.on',
                ],
                hookspath=[],
                runtime_hooks=[],
                excludes=['matplotlib', 'numpy', 'pandas', 'scipy'],
                win_no_prefer_redirects=False,
                win_private_assemblies=False,
                cipher=None,
                noarchive=False,
            )
            pyz = PYZ(a.pure, a.zipped_data, cipher=None)
            exe = EXE(
                pyz,
                a.scripts,
                [],
                exclude_binaries=True,
                name='Lens',
                debug=False,
                bootloader_ignore_signals=False,
                strip=False,
                upx=False,
                console=True,
                icon='tray_icon.ico'
            )
            coll = COLLECT(
                exe,
                a.binaries,
                a.zipfiles,
                a.datas,
                strip=False,
                upx=False,
                upx_exclude=[],
                name='Lens'
            )
            """)

          with open('lens.spec', 'w', encoding='utf-8') as f:
              f.write(spec)

      - name: 使用 PyInstaller 打包
        run: pyinstaller --clean lens.spec

      - name: 上传打包结果
        uses: actions/upload-artifact@v4
        with:
          name: Lens-Windows
          path: dist/Lens/
          retention-days: 7
