name: 打包 Windows 桌面程序 (Lens)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装 Python 依赖 & 打包工具
        run: |
          pip install .
          pip install pyinstaller pystray pillow aiosqlite

      - name: 构建前端
        shell: pwsh
        run: |
          if (Test-Path pnpm-workspace.yaml) { Remove-Item pnpm-workspace.yaml -Force }
          if (Test-Path package.json) {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            if ($pkg.workspaces -or $pkg.packages) { Remove-Item package.json -Force }
          }
          cd ui
          if (Test-Path pnpm-workspace.yaml) { Remove-Item pnpm-workspace.yaml -Force }
          if (Test-Path package.json) {
            $pkgUi = Get-Content package.json -Raw | ConvertFrom-Json
            if ($pkgUi.workspaces -or $pkgUi.packages) { Remove-Item package.json -Force }
          }
          pnpm install
          $env:LENS_UI_STATIC_EXPORT=1
          pnpm run build
          cd ..

      - name: 生成托盘图标
        shell: pwsh
        run: |
          $base64 = ""
          [IO.File]::WriteAllBytes("tray_icon.ico", [Convert]::FromBase64String($base64))

      - name: 创建启动器脚本 (db init + admin seed)
        shell: python
        run: |
          import textwrap

          code = textwrap.dedent("""\
            import os, sys, threading, webbrowser, traceback, subprocess
            import uvicorn
            from pystray import Icon, MenuItem, Menu
            from PIL import Image

            os.environ.setdefault('LENS_DATABASE_URL', 'sqlite+aiosqlite:///./lens.db')
            os.environ.setdefault('LENS_UI_STATIC_EXPORT', '1')

            def run_init():
                # 1. alembic upgrade to head
                from alembic.config import Config
                from alembic import command
                if getattr(sys, 'frozen', False):
                    base_dir = sys._MEIPASS
                else:
                    base_dir = os.getcwd()
                alembic_ini = os.path.join(base_dir, 'alembic.ini')
                if not os.path.exists(alembic_ini):
                    raise FileNotFoundError(f"alembic.ini not found at {alembic_ini}")
                cfg = Config(alembic_ini)
                cfg.set_main_option("sqlalchemy.url", os.environ["LENS_DATABASE_URL"])
                versions_dir = os.path.join(base_dir, 'alembic')
                if os.path.isdir(versions_dir):
                    cfg.set_main_option("script_location", versions_dir)
                command.upgrade(cfg, "head")
                print("Database migration completed.")

                # 2. seed admin (admin / admin)
                # lens seed-admin --username admin --password admin
                # 直接调用 CLI 入口函数
                from lens_api.cli import seed_admin_app
                try:
                    seed_admin_app("admin", "admin")
                    print("Admin user created (admin/admin).")
                except Exception:
                    # 可能已存在，忽略错误
                    print("Admin user already exists or creation skipped.")

            def start_server():
                try:
                    if getattr(sys, 'frozen', False):
                        base_dir = sys._MEIPASS
                    else:
                        base_dir = os.getcwd()
                    static_dir = os.path.join(base_dir, 'ui', 'out')
                    os.environ['LENS_UI_STATIC_DIR'] = static_dir

                    # run migration + seed
                    run_init()

                    from lens_api.gateway.service import app
                    uvicorn.run(app, host='127.0.0.1', port=18080)
                except Exception:
                    print("Server startup failed:")
                    traceback.print_exc()
                    with open('startup_error.log', 'w') as f:
                        traceback.print_exc(file=f)
                    input("Press Enter to exit...")
                    os._exit(1)

            def setup_tray():
                if getattr(sys, 'frozen', False):
                    icon_path = os.path.join(sys._MEIPASS, 'tray_icon.ico')
                else:
                    icon_path = 'tray_icon.ico'
                def open_ui():
                    webbrowser.open('http://127.0.0.1:18080')
                def quit_app(icon):
                    icon.stop()
                    os._exit(0)
                icon = Icon('lens', Image.open(icon_path), menu=Menu(
                    MenuItem('Open Admin', open_ui),
                    MenuItem('Exit', quit_app)
                ))
                icon.run()

            if __name__ == '__main__':
                threading.Thread(target=start_server, daemon=True).start()
                setup_tray()
            """)

          with open('launcher.py', 'w', encoding='utf-8') as f:
              f.write(code)

      - name: 创建 PyInstaller spec 文件 (include alembic)
        shell: python
        run: |
          import textwrap

          spec = textwrap.dedent("""\
            # -*- mode: python ; coding: utf-8 -*-
            a = Analysis(
                ['launcher.py'],
                pathex=[],
                binaries=[],
                datas=[
                    ('ui/out', 'ui/out'),
                    ('tray_icon.ico', '.'),
                    ('alembic.ini', '.'),
                    ('alembic', 'alembic'),
                ],
                hiddenimports=['aiosqlite'],
                hookspath=[],
                runtime_hooks=[],
                excludes=['matplotlib', 'numpy', 'pandas', 'scipy'],
                win_no_prefer_redirects=False,
                win_private_assemblies=False,
                cipher=None,
                noarchive=False,
            )
            pyz = PYZ(a.pure, a.zipped_data, cipher=None)
            exe = EXE(
                pyz,
                a.scripts,
                [],
                exclude_binaries=True,
                name='Lens',
                debug=False,
                bootloader_ignore_signals=False,
                strip=False,
                upx=True,
                console=True,
                icon='tray_icon.ico'
            )
            coll = COLLECT(
                exe,
                a.binaries,
                a.zipfiles,
                a.datas,
                strip=False,
                upx=True,
                upx_exclude=[],
                name='Lens'
            )
            """)

          with open('lens.spec', 'w', encoding='utf-8') as f:
              f.write(spec)

      - name: 使用 PyInstaller 打包
        run: pyinstaller lens.spec

      - name: 上传打包结果
        uses: actions/upload-artifact@v4
        with:
          name: Lens-Windows
          path: dist/Lens/
